name: Publish

# Publishes @langchain-canvas/react to npm when a GitHub Release is published
# (create the release after bumping the version — see the release:* scripts in
# packages/canvas-react/package.json). Can also be run manually.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (supply-chain attestation)
    steps:
      - uses: actions/checkout@v4

      # pnpm is pinned by "packageManager" in package.json — no version here.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Gate the release on a green build + tests.
      - run: pnpm -r typecheck
      - run: pnpm --filter @langchain-canvas/react test
      - run: pnpm --filter @langchain-canvas/react build

      # publishConfig in package.json swaps main/types/exports to dist for the
      # published tarball. --provenance signs it (verifiable origin on npm).
      - run: pnpm --filter @langchain-canvas/react publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
