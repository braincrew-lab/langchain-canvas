name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm is pinned by "packageManager" in package.json,
      # and passing both makes pnpm/action-setup error on the version mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm --filter @langchain-canvas/react test

      - name: Build package
        run: pnpm --filter @langchain-canvas/react build
